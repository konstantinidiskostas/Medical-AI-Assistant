############################################################
# 1. Database Connection Settings
############################################################
# The JDBC URL for the MySQL database.
# 'medical_ai_db' is the schema name.
# SSL is disabled for local development, and the timezone is set to UTC.
spring.datasource.url=jdbc:mysql://localhost:3306/medical_ai_db?useSSL=false&serverTimezone=UTC

# The database administrative username.
spring.datasource.username=root

# Secure password handling using an environment variable 'DB_PASSWORD'.
# This prevents sensitive credentials from being leaked to GitHub.
spring.datasource.password=${DB_PASSWORD}

############################################################
# 2. JPA / Hibernate Configuration
############################################################
# Specifies the DDL (Data Definition Language) strategy.
# 'update' automatically creates or modifies database tables based on Java @Entity classes.
spring.jpa.hibernate.ddl-auto=update

# Enables logging of all SQL queries generated by Hibernate to the console.
# Useful for debugging database interactions.
spring.jpa.show-sql=true

# Formats the logged SQL for better readability in the console.
spring.jpa.properties.hibernate.format_sql=true

############################################################
# 3. Database Driver Configuration
############################################################
# Explicitly defines the MySQL driver class to be used for the connection.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}

# Το URL δεν είναι μυστικό, μπορείς να το γράψεις κανονικά
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent