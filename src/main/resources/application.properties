############################################################
# 1. Ρυθμίσεις Σύνδεσης Βάσης Δεδομένων
############################################################
# Η διεύθυνση JDBC(java database connectivity) για τη σύνδεση με τη MySQL.
# 'medical_ai_db' είναι το όνομα της βάσης.
# Απενεργοποιούμε το SSL για το τοπικό περιβάλλον και ορίζουμε το timezone σε UTC.
spring.datasource.url=jdbc:mysql://localhost:3306/medical_ai_db?useSSL=false&serverTimezone=UTC

# Το όνομα χρήστη για την πρόσβαση στη βάση δεδομένων.
spring.datasource.username=root

# Ασφαλής διαχείριση κωδικού μέσω μεταβλητής περιβάλλοντος 'DB_PASSWORD'.
# Αυτό αποτρέπει την έκθεση ευαίσθητων δεδομένων στο GitHub.
spring.datasource.password=${DB_PASSWORD}

############################################################
# 2. Ρυθμίσεις JPA / Hibernate
############################################################
# Ορίζει τη στρατηγική DDL.
# Η επιλογή 'update' δημιουργεί ή τροποποιεί αυτόματα τους πίνακες βάσει των Java κλάσεων (@Entity).
spring.jpa.hibernate.ddl-auto=update

# Εμφανίζει όλα τα SQL ερωτήματα που παράγει το Hibernate στην κονσόλα.
# Πολύ χρήσιμο για τον έλεγχο (debugging) των λειτουργιών της βάσης.
spring.jpa.show-sql=true

# Μορφοποιεί το SQL στην κονσόλα για να είναι πιο ευανάγνωστο.
spring.jpa.properties.hibernate.format_sql=true

############################################################
# 3. Ρυθμίσεις Driver & Εξωτερικών API
############################################################
# Ορίζει τον συγκεκριμένο driver της MySQL που θα χρησιμοποιηθεί.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Ρυθμίσεις για το Gemini AI API
# Χρήση μεταβλητής περιβάλλοντος για το API Key για λόγους ασφαλείας.
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent

############################################################
# 4. Ρυθμίσεις JWT (JSON Web Token)
############################################################
# Μυστικό κλειδί για την υπογραφή των JWT tokens.
# ΣΕ ΠΑΡΑΓΩΓΗ: Βάλτε ένα δυνατό, τυχαίο κλειδί και μην το ανεβάσετε στο GitHub!
# Μπορείτε να το ορίσετε και ως μεταβλητή περιβάλλοντος: jwt.secret=${JWT_SECRET}
# Το κλειδί πρέπει να είναι τουλάχιστον 256-bit (32 χαρακτήρες) για HMAC-SHA256.
jwt.secret=MySuperSecretKeyForJWT2025MustBeAtLeast32Chars!!